<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="theme-color" content="#FBF6EC">
<title>NamastayTO</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="assets/img/brand/icon-192.png">
<link rel="apple-touch-icon" href="assets/img/brand/icon-180.png">
<script>try{var q=new URLSearchParams(location.search).get("theme");var t=q||localStorage.getItem("nsto-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<style>
  .gate{min-height:82vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px 22px}
  .gate img{height:150px; width:auto; filter:var(--logo-filter); margin-bottom:20px}
  .gate h1{font-size:clamp(30px,7vw,40px); font-weight:620}
  .gate p{color:var(--muted); max-width:420px; margin:6px auto}
</style>
</head>
<body style="padding-bottom:0">
<div class="gate">
  <img src="assets/img/brand/logo.png" alt="NamastayTO — namaste hands around the CN Tower">
  <h1 style="font-family:'Fraunces',serif;font-style:italic" data-i18n="105a77c3">NamastayTO</h1>
  <p data-i18n="1fcd93e5">A home-away-from-home in the heart of Toronto.</p>
  <p data-i18n="baa4b81d">Booked guests receive their personal guide link after their reservation is confirmed. 🙏</p>
</div>
<footer class="site">
  <p class="fm" data-i18n="69117da4">Emilee &amp; Pranay — NamastayTO, Toronto</p>
</footer>
</body>
</html>
